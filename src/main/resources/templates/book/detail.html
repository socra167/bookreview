<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/layout :: head(${book.title})}"></head>
<body>

<nav th:replace="~{fragments/layout :: nav}"></nav>

<div class="main">
    <div class="container">

        <!-- 책 정보 -->
        <div class="book-detail">
            <div class="book-cover">
                <img th:if="${book.thumbnail != null and !book.thumbnail.isBlank()}"
                     th:src="${book.thumbnail}" th:alt="${book.title}">
                <div th:unless="${book.thumbnail != null and !book.thumbnail.isBlank()}"
                     class="book-cover-placeholder">📘</div>
            </div>
            <div class="book-info">
                <h1 th:text="${book.title}">제목</h1>
                <p class="book-meta" th:if="${book.author != null}"
                   th:text="'저자: ' + ${book.author}">저자</p>
                <p class="book-meta" th:if="${book.publisher != null}"
                   th:text="'출판사: ' + ${book.publisher}">출판사</p>
                <p class="book-meta" th:text="'ISBN: ' + ${book.isbn}">ISBN</p>
                <p class="book-description"
                   th:if="${book.description != null and !book.description.isBlank()}"
                   th:text="${book.description}">책 소개</p>
            </div>
        </div>

        <!-- 리뷰 헤더 -->
        <div class="reviews-header">
            <p class="section-title" th:text="'리뷰 ' + ${reviews.size()} + '개'">리뷰</p>
            <div class="sort-btns">
                <a th:href="@{/books/{isbn}(isbn=${book.isbn},sort='LATEST')}"
                   th:classappend="${sort.name() == 'LATEST'} ? 'active'"
                   class="sort-btn">최신순</a>
                <a th:href="@{/books/{isbn}(isbn=${book.isbn},sort='POPULAR')}"
                   th:classappend="${sort.name() == 'POPULAR'} ? 'active'"
                   class="sort-btn">인기순</a>
            </div>
        </div>

        <!-- 리뷰 작성 폼 -->
        <th:block th:if="${loginMember != null}">
            <div class="review-form">
                <h3>리뷰 작성</h3>
                <form th:action="@{/books/{isbn}/reviews(isbn=${book.isbn})}" method="post">
                    <div class="form-row">
                        <div class="form-group" style="flex:1">
                            <label for="content">내용</label>
                            <textarea id="content" name="content" placeholder="이 책에 대한 솔직한 리뷰를 남겨주세요." required></textarea>
                        </div>
                        <div class="form-group">
                            <label for="rating">평점</label>
                            <select id="rating" name="rating">
                                <option value="5">★★★★★ (5)</option>
                                <option value="4">★★★★☆ (4)</option>
                                <option value="3">★★★☆☆ (3)</option>
                                <option value="2">★★☆☆☆ (2)</option>
                                <option value="1">★☆☆☆☆ (1)</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary">리뷰 등록</button>
                </form>
            </div>
        </th:block>

        <th:block th:unless="${loginMember != null}">
            <div class="alert alert-info">
                <a th:href="@{/login(redirectUrl=/books/{isbn}(isbn=${book.isbn}))}">로그인</a> 후 리뷰를 작성할 수 있습니다.
            </div>
        </th:block>

        <!-- 리뷰 목록 -->
        <div th:if="${reviews.isEmpty()}" class="empty-state">
            <span class="icon">✏️</span>
            <p>아직 리뷰가 없습니다. 첫 번째 리뷰를 작성해 보세요!</p>
        </div>

        <div th:each="review : ${reviews}" class="review-card">
            <div class="review-card-header">
                <span class="review-author" th:text="${review.memberNickname}">작성자</span>
                <span class="review-rating"
                      th:text="${'★'.repeat(review.rating) + '☆'.repeat(5 - review.rating)}">★★★★★</span>
                <span class="review-date"
                      th:text="${#temporals.format(review.createdAt, 'yyyy.MM.dd')}">날짜</span>
            </div>
            <p class="review-content" th:text="${review.content}">내용</p>
            <div class="review-footer">
                <form class="like-form"
                      th:action="@{/books/{isbn}/reviews/{reviewId}/likes(isbn=${book.isbn},reviewId=${review.id})}"
                      method="post">
                    <button type="submit">
                        ❤ <span th:text="${review.likeCount}">0</span>
                    </button>
                </form>
            </div>
        </div>

    </div>
</div>

</body>
</html>
